name: Rüya Tabirleri JSON Scraper

on:
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v3

      - name: Python'u Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Bağımlılıkları Yükle
        run: |
          python -m pip install --upgrade pip
          # cloudscraper yerine curl_cffi ekledik
          pip install curl_cffi beautifulsoup4
          
      - name: Scraper'ı Çalıştır
        run: python scraper.py
        
      - name: Değişiklikleri Commit Et ve Pushla
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add veri/*.json
          git commit -m "JSON verileri güncellendi" || echo "Değişiklik yok, commit atlanıyor."
          git push
